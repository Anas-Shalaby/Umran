name: Task Reminders

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger task reminders
        run: |
          curl -sf -X GET "${{ secrets.APP_URL }}/api/cron/task-reminders" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
